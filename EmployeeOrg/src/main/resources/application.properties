spring.application.name=EmployeeOrg
spring.h2.console.enabled=true

# Use a file-based H2 DB instead of in-memory
spring.datasource.url=jdbc:h2:file:./data/employeeorgdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# IMPORTANT: don't let Hibernate drop/recreate the schema on every startup
spring.jpa.hibernate.ddl-auto=update